<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>SelfEdu_Ai - Kirish</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="box">
        <h2>SelfEdu_Ai Kirish</h2>
        <input type="text" id="ism" placeholder="Ismingiz">
        <input type="text" id="familiya" placeholder="Familiyangiz">
        <button onclick="kirish()">Boshlash ➔</button>
    </div>
    <script>
        function kirish() {
            const ism = document.getElementById('ism').value;
            const fam = document.getElementById('familiya').value;
            if(ism && fam) {
                localStorage.setItem('user_name', ism + " " + fam);
                window.location.href = 'home.html';
            } else {
                alert("Iltimos, maydonlarni to'ldiring!");
            }
        }
    </script>
</body>
</html>
